# ====== Server ======
server.port=${SERVER_PORT:8080}

# ====== H2 (in-memory) Datasource ======
# No install, no login. Data resets every time the app stops.
spring.datasource.url=jdbc:h2:mem:notification_db;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ====== JPA / Hibernate ======
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ====== H2 web console (browse data at http://localhost:8080/h2-console) ======
# JDBC URL to use when logging in there: jdbc:h2:mem:notification_db
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ====== Mail (SMTP) ======
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-16-char-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ====== Notification thread pool ======
notification.executor.pool-size=${NOTIFICATION_POOL_SIZE:10}